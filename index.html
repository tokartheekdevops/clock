<!DOCTYPE html>
<html>
<head>
<title>Big Clock</title>
<style>
body {
  font-size: 100px;
  text-align: center;
  margin-top: 200px;
}
</style>
</head>
<body>
<div id="clock"></div>
<script>
setInterval(() => {
  document.getElementById("clock").innerHTML =
    new Date().toLocaleTimeString();
}, 1000);
</script>
</body>
</html>
